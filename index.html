<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Elsy</title>
  <style>
    :root { --cream:#F4EEDF; --paper:#FBF5E9; --ink:#1E1A14; --soft:#3C342A; --muted:#8A8170; --line:#E4DBCA; }
    * { box-sizing: border-box; }
    body { margin:0; background:var(--cream); color:var(--ink); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif; line-height:1.6; }
    .wrap { max-width:680px; margin:0 auto; padding:48px 24px 72px; }
    h1 { font-family:Georgia,"Times New Roman",serif; font-size:40px; letter-spacing:-0.5px; margin:0 0 8px; }
    p.lead { color:var(--soft); font-size:18px; margin:0 0 32px; }
    .card { display:block; background:var(--paper); border:1px solid var(--line); border-radius:16px; padding:18px 20px; margin:12px 0; text-decoration:none; color:var(--ink); }
    .card:hover { border-color:var(--muted); }
    .card b { font-size:17px; }
    .card span { display:block; color:var(--muted); font-size:14px; margin-top:2px; }
    footer { color:var(--muted); font-size:13px; margin-top:40px; }
    a { color:var(--ink); }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Elsy</h1>
    <p class="lead">A calm, private place to collect and plan things with the people who matter most.</p>

    <a class="card" href="privacy.html"><b>Privacy Policy</b><span>How Elsy handles your data</span></a>
    <a class="card" href="terms.html"><b>Terms of Use</b><span>The rules for using Elsy</span></a>
    <a class="card" href="support.html"><b>Support</b><span>Get help or contact us</span></a>

    <footer>© 2026 Elsy — Matthias Verbaert. Contact: <a href="mailto:gameswarfare@hotmail.com">gameswarfare@hotmail.com</a></footer>
  </div>
</body>
</html>
